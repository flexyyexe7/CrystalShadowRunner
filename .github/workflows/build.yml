name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip CrystalShadowRunner.zip

      - name: List files
        run: find . -name "gradlew" 2>/dev/null

      - name: Make gradlew executable
        run: chmod +x CrystalShadowRunner/gradlew

      - name: Build APK
        run: cd CrystalShadowRunner && ./gradlew assembleDebug --stacktrace

      - name: List APK
        run: find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CrystalShadowRunner-APK
          path: CrystalShadowRunner/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip project
        run: unzip CrystalShadowRunner.zip
      - name: Show folder structure
        run: ls -la && ls -la CrystalShadowRunner/ || true
      - name: Make gradlew executable
        run: find . -name "gradlew" -exec chmod +x {} \;
      - name: Build APK
        run: find . -name "gradlew" -exec dirname {} \; | head -1 | xargs -I{} sh -c 'cd {} && ./gradlew assembleDebug'
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CrystalShadowRunner-APK
          path: '**/app/build/outputs/apk/debug/app-debug.apk'

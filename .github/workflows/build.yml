name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip project
        run: unzip CrystalShadowRunner.zip
      - name: Make gradlew executable
        run: chmod +x CrystalShadowRunner/gradlew
      - name: Build APK
        run: cd CrystalShadowRunner && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CrystalShadowRunner-APK
          path: CrystalShadowRunner/app/build/outputs/apk/debug/app-debug.apk
